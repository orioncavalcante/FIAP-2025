<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="atividade.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Loja de Produtos</h1>
        <p>Escolha seu produto favorito e preencha seu nome para comprar</p>
    </header>

    <main>
        <section class="produtos">
            <div class="card">
                <h2>Tábua da cruz de Jesus</h2>
                <p class="descricao">tábua confortável com ótima qualidade</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>

            <div class="card">
                <h2>Arma que matou o Kurt Cobain</h2>
                <p class="descricao">arma com design moderno para jogos</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>

            <div class="card">
                <h2>Judeu</h2>
                <p class="descricao">judeu resistente, confortável e com rgd</p>
                <input type="text" placeholder="Digite seu nome">
                <button>Comprar</button>
            </div>

        </section>
    </main>
</body>
</html>
